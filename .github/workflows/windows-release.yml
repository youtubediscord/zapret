name: Build Zapret runtime

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      builder:
        description: Сборщик runtime
        required: true
        default: nuitka
        type: choice
        options:
          - nuitka
          - pyinstaller

jobs:
  build:
    runs-on: windows-2022
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      ZAPRET_BUILD_METHOD: ${{ github.event.inputs.builder || 'nuitka' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip pywin32 psutil requests urllib3 PySocks tgcrypto qtawesome PyQt6-Fluent-Widgets wmi httpx packaging

      - name: Generate build files
        shell: python
        run: |
          import os, pathlib
          cfg = pathlib.Path("src/config")
          cfg.mkdir(exist_ok=True)
          # build_info.py
          (cfg / "build_info.py").write_text(
              "CHANNEL='stable'\nAPP_VERSION='0.0.0.0'\n",
              encoding="utf-8-sig")
          # _build_secrets.py (empty — no secrets in public CI)
          (cfg / "_build_secrets.py").write_text(
              "TG_UPDATE_BOT_TOKEN=''\n"
              "GITHUB_UPDATE_TOKEN=''\n"
              "TG_LOG_BOT_TOKEN_PROD=''\n"
              "TG_LOG_BOT_TOKEN_DEV=''\n"
              "TG_LOG_CHAT_ID=0\n"
              "UPDATE_SERVERS=[]\n"
              "PREMIUM_API_BASE_URL=''\n",
              encoding="utf-8-sig")

      - name: Build canonical runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PYTHONPATH = (Resolve-Path "src").Path
          $modules = @(
            python -c "from app.feature_facades import iter_lazy_feature_facade_modules; from ui.page_registry import iter_lazy_page_modules; print(*sorted(set(iter_lazy_feature_facade_modules()) | set(iter_lazy_page_modules())), sep='\n')"
          )
          if ($LASTEXITCODE -ne 0) {
            throw "Не удалось получить список динамически загружаемых модулей"
          }

          $buildRoot = Join-Path $PWD "ci-build"
          $artifactRoot = Join-Path $PWD "artifact"
          $runtimeTarget = Join-Path $artifactRoot "_internal"
          New-Item -ItemType Directory -Path $runtimeTarget -Force | Out-Null

          if ($env:ZAPRET_BUILD_METHOD -eq "nuitka") {
            $nuitkaArgs = @(
              "-m", "nuitka",
              "--standalone",
              "--assume-yes-for-downloads",
              "--windows-console-mode=disable",
              "--windows-uac-admin",
              "--follow-imports",
              "--enable-plugin=pyqt6",
              "--nofollow-import-to=numpy",
              "--nofollow-import-to=PIL",
              "--noinclude-dlls=opengl32sw.dll",
              "--windows-icon-from-ico=src\ico\Zapret2.ico",
              "--output-filename=Zapret.exe",
              "--output-dir=$buildRoot\nuitka"
            )
            $nuitkaArgs += @($modules | ForEach-Object { "--include-module=$_" })
            $nuitkaArgs += "src\main.py"
            & python @nuitkaArgs
            if ($LASTEXITCODE -ne 0) { throw "Nuitka завершилась с кодом $LASTEXITCODE" }
            $runtimeSource = Join-Path $buildRoot "nuitka\main.dist"
          }
          elseif ($env:ZAPRET_BUILD_METHOD -eq "pyinstaller") {
            $pyinstallerArgs = @(
              "-m", "PyInstaller",
              "--noconfirm",
              "--clean",
              "--name", "Zapret",
              "--windowed",
              "--uac-admin",
              "--onedir",
              "--contents-directory", ".",
              "--paths", "src",
              "--icon", "src\ico\Zapret2.ico",
              "--workpath", "$buildRoot\pyinstaller-work",
              "--distpath", "$buildRoot\pyinstaller-dist"
            )
            $pyinstallerArgs += @($modules | ForEach-Object { "--hidden-import=$_" })
            $pyinstallerArgs += "src\main.py"
            & python @pyinstallerArgs
            if ($LASTEXITCODE -ne 0) { throw "PyInstaller завершился с кодом $LASTEXITCODE" }
            $runtimeSource = Join-Path $buildRoot "pyinstaller-dist\Zapret"
          }
          else {
            throw "Неизвестный сборщик: $env:ZAPRET_BUILD_METHOD"
          }

          $builtExe = Join-Path $runtimeSource "Zapret.exe"
          if (-not (Test-Path -LiteralPath $builtExe -PathType Leaf)) {
            throw "Сборщик не создал ожидаемый файл: $builtExe"
          }
          Copy-Item -Path (Join-Path $runtimeSource "*") -Destination $runtimeTarget -Recurse -Force
          if (-not (Test-Path -LiteralPath (Join-Path $runtimeTarget "Zapret.exe") -PathType Leaf)) {
            throw "Не удалось подготовить artifact\_internal\Zapret.exe"
          }
          Write-Host "Готово: artifact\_internal\Zapret.exe ($env:ZAPRET_BUILD_METHOD)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zapret-${{ github.sha }}
          path: artifact/
          retention-days: 30
